<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/script.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="output"><input type="text" /></div>
      <div class="row-one">
        <button id="backspace" class="helper">DEL</button>
        <button id="clear" class="helper">AC</button>
        <button id="modulo" class="operator">%</button>
        <button id="divide" class="operator">÷</button>
      </div>
      <div class="row-two">
        <button id="seven" class="number">7</button>
        <button id="eight" class="number">8</button>
        <button id="nine" class="number">9</button>
        <button id="multiply" class="operator">X</button>
      </div>
      <div class="row-three">
        <button id="four" class="number">4</button>
        <button id="five" class="number">5</button>
        <button id="six" class="number">6</button>
        <button id="subtract" class="operator">-</button>
      </div>
      <div class="row-four">
        <button id="one" class="number">1</button>
        <button id="two" class="number">2</button>
        <button id="three" class="number">3</button>
        <button id="add" class="operator">+</button>
      </div>
      <div class="row-five">
        <button id="unary" class="operator unary">+/-</button>
        <button id="zero" class="number">0</button>
        <button id="decimal" class="helper">.</button>
        <button id="equals" class="helper">=</button>
      </div>
    </div>
  </body>
</html>
