<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/script.js"></script>
  </head>
  <body>
    <div class="calculator-container">
      <div class="display-row">
        <input type="text" id="display" readonly />
      </div>
      <div class="buttons">
        <button id="clear" type="button" class="helper">Clear</button>
        <div class="button-row">
          <button id="seven" type="button" class="number">7</button>
          <button id="eight" type="button" class="number">8</button>
          <button id="nine" type="button" class="number">9</button>
          <button id="divide" type="button" class="operator">÷</button>
        </div>
        <div class="button-row">
          <button id="four" type="button" class="number">4</button>
          <button id="five" type="button" class="number">5</button>
          <button id="six" type="button" class="number">6</button>
          <button id="multiply" type="button" class="operator">x</button>
        </div>
        <div class="button-row">
          <button id="one" type="button" class="number">1</button>
          <button id="two" type="button" class="number">2</button>
          <button id="three" type="button" class="number">3</button>
          <button id="subtract" type="button" class="operator">-</button>
        </div>
        <div class="button-row">
          <button id="zero" type="button" class="number">0</button>
          <button id="decimal" type="button" class="number">.</button>
          <button id="equals" type="button" class="helper">=</button>
          <button id="add" type="button" class="operator">+</button>
        </div>
      </div>
    </div>
  </body>
</html>
