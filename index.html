<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculator</title>
	<link rel="stylesheet" href="style.css">
	<script src="script.js" defer></script>
</head>

<body>
	<div class="flexbox-container">
		<div class="top-display">
			<div class="display">420</div>
			<button class="button button-clear">A/C</button>
		</div>
		<div class="top-buttons">
			<button class="button number">7</button>
			<button class="button number">8</button>
			<button class="button number">9</button>
			<button class="button button-divide">÷</button>
		</div>
		<div class="middle-top-buttons">
			<button class="button number">4</button>
			<button class="button number">5</button>
			<button class="button number">6</button>
			<button class="button button-multiply">x</button>
		</div>
		<div class="middle-bottom-buttons">
			<button class="button number">1</button>
			<button class="button number">2</button>
			<button class="button number">3</button>
			<button class="button button-subtract">-</button>
		</div>
		<div class="bottom-buttons">
			<button class="button number">0</button>
			<button class="button button-decimal">.</button>
			<button class="button button-add">+</button>
			<button class="button button-equal">=</button>
		</div>
	</div>
</body>

</html>
